// ─── SPHERE PIXEL RENDERER ────────────────────────────────────────────────
// For each screen pixel, compute the lat/lng and look up the texture
// KEY FORMULA (verified mathematically):
//   nx = (px - CX) / R          screen X normalized
//   ny = (py - CY) / R          screen Y normalized (positive = DOWN)
//   nz = sqrt(1 - nx^2 - ny^2)  depth into screen
//
//   WITH ROTATION rot:
//   Rotate nx,nz around Y axis by rot:
//     rx = nx*cos(rot) + nz*sin(rot)   ... but simpler:
//     longitude = atan2(nx_rot, nz_rot) where nx_rot,nz_rot are rotated
//
//   lat = asin(-ny)    ← NEGATIVE because screen-y is DOWN but lat is UP
//   lng = atan2(nx, nz) + rot   ← atan2(nx,nz) gives angle, shift by rot
//
//   texture u = (lng/(2PI) + 0.5) % 1   → 0=lng-180, 0.5=lng0, 1=lng180
//   texture v = 0.5 - lat/(PI)           → 0=lat90(top), 1=lat-90(bottom)

function buildSphere(){
  if(!texOK||!src) return;
  if(pRot===rot&&pTilt===tilt) return;
  pRot=rot; pTilt=tilt;
  var d=Math.round(R*2);
  if(offC.width!==d){offC.width=d;offC.height=d;offX=offC.getContext('2d');}
  var iW=src.width,iH=src.height,px=src.data;
  var dst=offX.createImageData(d,d);
  var out=dst.data;
  var PI=Math.PI, PI2=2*PI;
  var cosT=Math.cos(tilt),sinT=Math.sin(tilt);

  for(var py2=0;py2<d;py2++){
    for(var px2=0;px2<d;px2++){
      var nx=(px2-d/2)/(d/2);
      var ny=(py2-d/2)/(d/2);  // positive = downward on screen
      var nz2=1-nx*nx-ny*ny;
      if(nz2<=0) continue;
      var nz=Math.sqrt(nz2);

      // Apply tilt (rotation around X axis)
      // Tilt rotates Y and Z components
      var ny2= ny*cosT + nz*sinT;
      var nz2b=-ny*sinT + nz*cosT;

      // Geographic coordinates
      // lat: asin(-ny2) because screen-y down = negative latitude
      var la=Math.asin(Math.max(-1,Math.min(1,-ny2)));
      // lng: atan2(nx, nz2b) gives angle in [-PI,PI], then add rot
      var lo=Math.atan2(nx,nz2b)+rot;

      // Texture UV — standard equirectangular
      var u=((lo/PI2)+0.5+2)%1;   // +2 ensures positive before modulo
      var v=0.5-la/PI;

      var tx2=Math.floor(u*iW)%iW;
      var ty2=Math.min(iH-1,Math.max(0,Math.floor(v*iH)));
      var si=(ty2*iW+tx2)*4,di=(py2*d+px2)*4;

      // Limb darkening for realism
      var ld=nz*nz*(2-nz*nz);
      out[di]  =px[si]  *ld;
      out[di+1]=px[si+1]*ld;
      out[di+2]=px[si+2]*ld;
      out[di+3]=255;
    }
  }
  offX.putImageData(dst,0,0);
}

// ─── MARKER PROJECTION ───────────────────────────────────────────────────
// EXACT INVERSE of buildSphere:
//   Given lat/lng, find screen nx,ny
//   lo = lng*PI/180
//   la = lat*PI/180
//
//   Reverse of: lo_screen = atan2(nx, nz_untilted) + rot
//   So:         angle = lo - rot = atan2(nx, nz_untilted)
//
//   Reverse of: la = asin(-ny2) where ny2 = ny*cosT + nz*sinT
//   So:         ny2 = -sin(la)
//
//   3D unit sphere point (before tilt):
//     nx      = cos(la)*sin(lo - rot)
//     ny2     = -sin(la)              ← from lat formula above
//     nz_base = cos(la)*cos(lo - rot)
//
//   Apply tilt rotation (inverse of what buildSphere undoes):
//     ny_screen = ny2*cosT - nz_base*sinT
//     nz_screen = ny2*sinT + nz_base*cosT
//
//   Screen position:
//     screen_x = CX + nx * R
//     screen_y = CY + ny_screen * R
//     visible if nz_screen > 0

function project(lat,lng){
  var lo=lng*Math.PI/180;
  var la=lat*Math.PI/180;
  var cosT=Math.cos(tilt),sinT=Math.sin(tilt);

  // 3D point on sphere (no tilt applied yet)
  var angle=lo-rot;
  var nx=Math.cos(la)*Math.sin(angle);
  var ny2=-Math.sin(la);              // screen-y component before tilt
  var nz_b=Math.cos(la)*Math.cos(angle);

  // Apply tilt to get final screen y and depth
  var ny_s= ny2*cosT - nz_b*sinT;    // screen y (positive=down)
  var nz_s= ny2*sinT + nz_b*cosT;    // depth (positive=visible)

  return{x:CX+nx*R, y:CY+ny_s*R, z:nz_s};
}

function col(u){return u>=0.88?'#10b981':u>=0.75?'#f59e0b':'#ef4444';}
function rgb(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);}

function pin(x,y,sz,c,isSel,isHov,label){
  var hx=x,hy=y-sz*1.4,hr=sz;
  if(isSel){var p=1+0.55*Math.sin(pT);ctx.beginPath();ctx.arc(hx,hy,hr*p*2.2,0,Math.PI*2);ctx.strokeStyle=c;ctx.lineWidth=2;ctx.globalAlpha=0.22;ctx.stroke();ctx.globalAlpha=1;}
  if(isHov||isSel){var g=ctx.createRadialGradient(hx,hy,0,hx,hy,hr*2.8);g.addColorStop(0,'rgba('+rgb(c)+',0.38)');g.addColorStop(1,'rgba('+rgb(c)+',0)');ctx.beginPath();ctx.arc(hx,hy,hr*2.8,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=sz*1.2;ctx.shadowOffsetX=1.5;ctx.shadowOffsetY=2;
  ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI*0.75,Math.PI*2.25);ctx.lineTo(hx,y+sz*0.2);ctx.closePath();ctx.fillStyle=c;ctx.fill();ctx.restore();
  ctx.beginPath();ctx.arc(hx,hy,hr,Math.PI*0.75,Math.PI*2.25);ctx.lineTo(hx,y+sz*0.2);ctx.closePath();ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=0.8;ctx.stroke();
  ctx.beginPath();ctx.arc(hx,hy,hr*0.44,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.95)';ctx.fill();
  ctx.beginPath();ctx.arc(hx,hy,hr*0.17,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();
  if((isHov||isSel)&&label){
    ctx.font='bold 11px Segoe UI,Arial';ctx.textAlign='center';
    var tw=ctx.measureText(label).width,lx=hx,ly=hy-hr-10;
    ctx.fillStyle='rgba(8,16,32,0.92)';ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(lx-tw/2-8,ly-14,tw+16,18,5);else ctx.rect(lx-tw/2-8,ly-14,tw+16,18);
    ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=0.9;ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(lx-tw/2-8,ly-14,tw+16,18,5);else ctx.rect(lx-tw/2-8,ly-14,tw+16,18);
    ctx.stroke();ctx.fillStyle='#fff';ctx.fillText(label,lx,ly-0.5);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#000008';ctx.fillRect(0,0,W,H);
  // Stars
  var ss=[[73,45,0.8],[187,92,0.5],[312,38,0.9],[441,155,0.6],[578,67,0.7],[689,134,0.5],[812,48,0.8],[934,178,0.6],[56,245,0.5],[143,312,0.7],[267,278,0.9],[389,334,0.5],[512,298,0.6],[634,267,0.8],[756,312,0.5],[878,278,0.7],[34,412,0.6],[156,445,0.8],[278,478,0.5],[401,512,0.7],[523,434,0.9],[645,467,0.5],[767,445,0.6],[889,478,0.8],[67,567,0.5],[189,534,0.7],[311,578,0.6],[433,545,0.9],[555,589,0.5],[677,556,0.7],[45,634,0.6],[167,667,0.8],[289,645,0.5],[411,678,0.7],[899,678,0.6],[78,734,0.8],[200,767,0.5],[444,778,0.7],[688,789,0.6],[932,778,0.5]];
  for(var s=0;s<ss.length;s++){ctx.beginPath();ctx.arc(ss[s][0]/1000*W,ss[s][1]/800*H,ss[s][2]*0.85,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+ss[s][2]+')';ctx.fill();}
  var halo=ctx.createRadialGradient(CX,CY,R*0.86,CX,CY,R*1.30);halo.addColorStop(0,'rgba(135,206,255,0.28)');halo.addColorStop(0.45,'rgba(100,180,255,0.09)');halo.addColorStop(1,'rgba(60,130,255,0)');ctx.beginPath();ctx.arc(CX,CY,R*1.30,0,Math.PI*2);ctx.fillStyle=halo;ctx.fill();

  buildSphere();

  ctx.save();ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.clip();
  if(texOK&&offC.width>0){ctx.drawImage(offC,CX-R,CY-R,R*2,R*2);}
  else{var fb=ctx.createRadialGradient(CX-R*0.2,CY-R*0.3,R*0.05,CX,CY,R);fb.addColorStop(0,'#5ba3d9');fb.addColorStop(0.5,'#1a6fa8');fb.addColorStop(1,'#0a2744');ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=fb;ctx.fill();}
  ctx.restore();

  var rim=ctx.createRadialGradient(CX,CY,R*0.93,CX,CY,R*1.07);rim.addColorStop(0,'rgba(160,215,255,0.22)');rim.addColorStop(1,'rgba(160,215,255,0)');ctx.beginPath();ctx.arc(CX,CY,R*1.07,0,Math.PI*2);ctx.fillStyle=rim;ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.strokeStyle='rgba(160,215,255,0.30)';ctx.lineWidth=1.5;ctx.stroke();
  var sh=ctx.createRadialGradient(CX-R*0.45,CY-R*0.45,0,CX-R*0.15,CY-R*0.18,R*0.88);sh.addColorStop(0,'rgba(255,255,255,0.18)');sh.addColorStop(0.3,'rgba(255,255,255,0.05)');sh.addColorStop(1,'rgba(255,255,255,0)');ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=sh;ctx.fill();

  // Project all plants and draw pins
  var v=[];
  for(var i=0;i<PLANTS.length;i++){
    var pl=PLANTS[i],pos=project(pl.lat,pl.lng);
    if(pos.z>0.04) v.push({p:pl,pos:pos});
  }
  for(var i=0;i<v.length;i++){
    var pl=v[i].p,ps=v[i].pos,c=col(pl.util);
    var iS=sel===pl.id,iH=hov===pl.id;
    pin(ps.x,ps.y,iS?13:iH?11:8,c,iS,iH,pl.name.replace(' Plant',''));
  }
  pT+=0.06; vis=v;
}

function loop(){requestAnimationFrame(loop);if(!drag&&!hov_icon)rot-=0.004;draw();}

function hit(mx,my){
  var r=cv.getBoundingClientRect(),sx=mx-r.left,sy=my-r.top;
  for(var i=0;i<vis.length;i++){var v=vis[i],hx=v.pos.x,hy=v.pos.y-8*1.4,dx=sx-hx,dy=sy-hy;if(dx*dx+dy*dy<400)return v.p;}
  return null;
}

cv.addEventListener('mousedown',function(e){drag=true;prev={x:e.clientX,y:e.clientY};cv.style.cursor='grabbing';});
cv.addEventListener('mousemove',function(e){
  if(drag){rot-=(e.clientX-prev.x)*0.007;tilt+=(e.clientY-prev.y)*0.004;tilt=Math.max(-0.6,Math.min(0.6,tilt));prev={x:e.clientX,y:e.clientY};hov=null;hov_icon=false;document.getElementById('tooltip').style.display='none';return;}
  var h=hit(e.clientX,e.clientY);
  if(h){hov_icon=true;hov=h.id;cv.style.cursor='pointer';}
  else{hov_icon=false;hov=null;cv.style.cursor='grab';document.getElementById('tooltip').style.display='none';}
});
cv.addEventListener('mouseup',function(){drag=false;cv.style.cursor='grab';});
cv.addEventListener('mouseleave',function(){drag=false;hov_icon=false;hov=null;cv.style.cursor='default';document.getElementById('tooltip').style.display='none';});
cv.addEventListener('click',function(e){
  var h=hit(e.clientX,e.clientY);
  if(h){sel=h.id;tip(h,e.clientX,e.clientY);if(window.parent&&window.parent!==window)window.parent.postMessage({type:'plantClick',plantId:h.id,plantName:h.name},'*');}
  else{sel=null;document.getElementById('tooltip').style.display='none';}
});
function tip(p,mx,my){
  document.getElementById('tt-name').textContent=p.name;
  document.getElementById('tt-city').textContent=p.city+', '+p.country;
  document.getElementById('tt-region').textContent=p.region;
  document.getElementById('tt-util').textContent=Math.round(p.util*100)+'%';
  document.getElementById('tt-oee').textContent=Math.round(p.oee*100)+'%';
  document.getElementById('tt-rev').textContent='$'+p.rev.toFixed(1)+'M';
  var tx=mx+20,ty=my-10;if(tx+210>W)tx=mx-225;if(ty+185>H)ty=H-190;
  var t=document.getElementById('tooltip');t.style.left=tx+'px';t.style.top=ty+'px';t.style.display='block';
}
loop();
</script>
</body>
